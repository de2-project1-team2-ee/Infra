AWSTemplateFormatVersion: '2010-09-09'
Description: |
  [Data Engineering Project] 
  Multi-AZ (2 AZs) 3-Tier VPC Infrastructure.
  This template provides high availability and scalability for EKS clusters.

Parameters:
  TeamNumber:
    Type: Number
    Default: 1
  VPCCidr:
    Type: String
    Default: "10.0.0.0/20"
  
  # --- [네트워크 사이징 파라미터] ---
  # 전체 VPC를 8개 팀으로 나누고, 각 팀은 /23 대역을 가짐
  TeamChunkCount: { Type: Number, Default: 8 }
  TeamMaskBits: { Type: Number, Default: 9 }
  
  # 각 팀 구역 내에서 App은 /24, Public/DB는 /26으로 분할
  AppSubnetMaskBits: { Type: Number, Default: 8 }
  PublicDBSubnetMaskBits: { Type: Number, Default: 6 }

  # 각 구역을 2개(App) 또는 4개(Public/DB)의 슬롯으로 쪼갬
  # 멀티 AZ 구성을 위해 최소 2개 이상의 슬롯이 필요함
  PublicDBSubnetCount: { Type: Number, Default: 4 }
  AppSubnetCount: { Type: Number, Default: 2 }

Resources:
  # =========================================================
  # 1. 공용 네트워크 리소스 (VPC, IGW)
  # =========================================================
  MainVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: shared-ha-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: shared-igw

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref MainVPC
      InternetGatewayId: !Ref InternetGateway

  # =========================================================
  # 2. NAT Gateway (Public 영역에 위치하여 Private 통신 지원)
  # 비용 최적화를 위해 NAT는 AZ-a에 1개만 생성 (운영 환경은 AZ별 생성이 정석)
  # =========================================================
  # AZ-a용 NAT 및 IP
  NatEIPA:
    Type: AWS::EC2::EIP
    DependsOn: AttachGateway
    Properties: { Domain: vpc }

  NatGatewayA:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEIPA.AllocationId
      SubnetId: !Ref TeamPublicSubnetA
      Tags: [{ Key: Name, Value: !Sub "team-${TeamNumber}-nat-a" }]
  
  # AZ-b용 NAT 및 IP
  NatEIPB:
    Type: AWS::EC2::EIP
    DependsOn: AttachGateway
    Properties: { Domain: vpc }

  NatGatewayB:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEIPB.AllocationId
      SubnetId: !Ref TeamPublicSubnetB
      Tags: [{ Key: Name, Value: !Sub "team-${TeamNumber}-nat-b" }]

  # =========================================================
  # 3. Public Subnets (가용영역 A, B 대칭 배치)
  # 외부 로드밸런서(ALB)가 배치될 구역
  # =========================================================
  TeamPublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MainVPC
      CidrBlock: !Select [ 0, !Cidr [ !Select [ !Ref TeamNumber, !Cidr [ !Ref VPCCidr, !Ref TeamChunkCount, !Ref TeamMaskBits ] ], !Ref PublicDBSubnetCount, !Ref PublicDBSubnetMaskBits] ]
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "team-${TeamNumber}-pub-a"
        - Key: "kubernetes.io/role/elb"
          Value: "1"

  TeamPublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MainVPC
      CidrBlock: !Select [ 1, !Cidr [ !Select [ !Ref TeamNumber, !Cidr [ !Ref VPCCidr, !Ref TeamChunkCount, !Ref TeamMaskBits ] ], !Ref PublicDBSubnetCount, !Ref PublicDBSubnetMaskBits] ]
      AvailabilityZone: !Select [ 1, !GetAZs '' ]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "team-${TeamNumber}-pub-b"
        - Key: "kubernetes.io/role/elb"
          Value: "1"

  # =========================================================
  # 4. App Private Subnets (가용영역 A, B 대칭 배치)
  # EKS 워커 노드 및 데이터 처리 엔진이 실행될 핵심 구역
  # =========================================================
  TeamAppSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MainVPC
      CidrBlock: !Select [ 0, !Cidr [ !Select [ !Ref TeamNumber, !Cidr [ !Ref VPCCidr, !Ref TeamChunkCount, !Ref TeamMaskBits ] ], !Ref AppSubnetCount, !Ref AppSubnetMaskBits] ]
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      Tags:
        - Key: Name
          Value: !Sub "team-${TeamNumber}-app-a"
        - Key: "kubernetes.io/role/internal-elb"
          Value: "1"

  TeamAppSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MainVPC
      CidrBlock: !Select [ 1, !Cidr [ !Select [ !Ref TeamNumber, !Cidr [ !Ref VPCCidr, !Ref TeamChunkCount, !Ref TeamMaskBits ] ], !Ref AppSubnetCount, !Ref AppSubnetMaskBits] ]
      AvailabilityZone: !Select [ 1, !GetAZs '' ]
      Tags:
        - Key: Name
          Value: !Sub "team-${TeamNumber}-app-b"
        - Key: "kubernetes.io/role/internal-elb"
          Value: "1"

  # =========================================================
  # 5. DB Private Subnets (가용영역 A, B 대칭 배치)
  # 데이터 저장소(RDS 등)가 위치할 보안 최상위 구역
  # =========================================================
  TeamDBSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MainVPC
      CidrBlock: !Select [ 2, !Cidr [ !Select [ !Ref TeamNumber, !Cidr [ !Ref VPCCidr, !Ref TeamChunkCount, !Ref TeamMaskBits ] ], !Ref PublicDBSubnetCount, !Ref PublicDBSubnetMaskBits] ]
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      Tags:
        - Key: Name
          Value: !Sub "team-${TeamNumber}-db-a"

  TeamDBSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MainVPC
      CidrBlock: !Select [ 3, !Cidr [ !Select [ !Ref TeamNumber, !Cidr [ !Ref VPCCidr, !Ref TeamChunkCount, !Ref TeamMaskBits ] ], !Ref PublicDBSubnetCount, !Ref PublicDBSubnetMaskBits] ]
      AvailabilityZone: !Select [ 1, !GetAZs '' ]
      Tags:
        - Key: Name
          Value: !Sub "team-${TeamNumber}-db-b"

  # =========================================================
  # 6. 라우팅 및 연결 설정
  # =========================================================
  # Public은 IGW 하나를 공유하므로 기존과 동일
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MainVPC
      Tags: [{ Key: Name, Value: !Sub "team-${TeamNumber}-pub-rt" }]

  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  # --- [Private A용 라우팅: NAT-A 사용] ---
  PrivateRouteTableA:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MainVPC
      Tags: [{ Key: Name, Value: !Sub "team-${TeamNumber}-priv-rt-a" }]

  PrivateNatRouteA:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableA
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGatewayA

  # --- [Private B용 라우팅: NAT-B 사용] ---
  PrivateRouteTableB:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MainVPC
      Tags: [{ Key: Name, Value: !Sub "team-${TeamNumber}-priv-rt-b" }]

  PrivateNatRouteB:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableB
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGatewayB

  # =========================================================
  # 7. 서브넷-라우팅 테이블 연결 (대칭 연결)
  # =========================================================
  # Public 연결
  PubAssocA: { Type: AWS::EC2::SubnetRouteTableAssociation, Properties: { SubnetId: !Ref TeamPublicSubnetA, RouteTableId: !Ref PublicRouteTable } }
  PubAssocB: { Type: AWS::EC2::SubnetRouteTableAssociation, Properties: { SubnetId: !Ref TeamPublicSubnetB, RouteTableId: !Ref PublicRouteTable } }

  # Private A 계층 연결 (App-a, DB-a) -> NAT-A 경로 사용
  AppAssocA: { Type: AWS::EC2::SubnetRouteTableAssociation, Properties: { SubnetId: !Ref TeamAppSubnetA, RouteTableId: !Ref PrivateRouteTableA } }
  DBAssocA: { Type: AWS::EC2::SubnetRouteTableAssociation, Properties: { SubnetId: !Ref TeamDBSubnetA, RouteTableId: !Ref PrivateRouteTableA } }

  # Private B 계층 연결 (App-b, DB-b) -> NAT-B 경로 사용
  AppAssocB: { Type: AWS::EC2::SubnetRouteTableAssociation, Properties: { SubnetId: !Ref TeamAppSubnetB, RouteTableId: !Ref PrivateRouteTableB } }
  DBAssocB: { Type: AWS::EC2::SubnetRouteTableAssociation, Properties: { SubnetId: !Ref TeamDBSubnetB, RouteTableId: !Ref PrivateRouteTableB } }
