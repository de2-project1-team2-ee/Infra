# мқҙлҜё л§Ңл“Өм–ҙм§„ vpcмҷҖ public subnetAм—җ лӘ…л №м„ңлІ„ мғқм„ұ

AWSTemplateFormatVersion: '2010-09-09'
Description: "Management Server (Bastion) for EKS - Reusing existing Network Infra"

Parameters:
  # 1. 1лІҲ мҠӨнғқм—җм„ң л§Ңл“  VPC IDлҘј м„ нғқн•ҳм„ёмҡ”.
  TargetVpcId:
    Description: "Select the VPC created by the Network Infra stack"
    Type: AWS::EC2::VPC::Id

  # 2. 1лІҲ мҠӨнғқм—җм„ң л§Ңл“  Public Subnet AлҘј м„ нғқн•ҳм„ёмҡ”. (мҷёл¶Җ м ‘мҶҚмҡ©)
  TargetSubnetId:
    Description: "Select TeamPublicSubnetA from the Network Infra stack"
    Type: AWS::EC2::Subnet::Id

  # 3. м ‘мҶҚм—җ мӮ¬мҡ©н•  EC2 нӮӨнҺҳм–ҙлҘј м„ нғқн•ҳм„ёмҡ”.
  KeyName:
    Description: "Existing EC2 KeyPair for SSH access"
    Type: AWS::EC2::KeyPair::KeyName

  # 4. м ‘мҶҚмқ„ н—Ҳмҡ©н•  IP лІ”мң„ (кё°ліёк°’мқҖ м „мІҙ н—Ҳмҡ©мқҙлӮҳ, лӮҙ IPл§Ң л„ЈлҠ” кІғмқ„ к¶ҢмһҘ)
  SgIngressSshCidr:
    Description: "CIDR block allowed to SSH into the bastion"
    Type: String
    Default: 0.0.0.0/0

  MyInstanceType:
    Description: "EC2 instance type"
    Type: String
    Default: t3.small

  LatestAmiId:
    Description: "Amazon Linux 2 AMI"
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'

  ClusterBaseName:
    Type: String
    Default: myeks-mgmt
    Description: "Prefix for resource naming"

Resources:
  # ------------------------------------------------------------
  # ліҙм•Ҳ к·ёлЈ№: кё°мЎҙ VPC лӮҙл¶Җм—җ мғқм„ұ
  # ------------------------------------------------------------
  BastionSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "Security Group for ${ClusterBaseName} Bastion"
      VpcId: !Ref TargetVpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: '22'
          ToPort: '22'
          CidrIp: !Ref SgIngressSshCidr
      Tags:
        - Key: Name
          Value: !Sub "${ClusterBaseName}-sg"

  # ------------------------------------------------------------
  # IAM м—ӯн• : EKS кҙҖлҰ¬лҘј мң„н•ң к¶Ңн•ң л¶Җм—¬
  # ------------------------------------------------------------
  BastionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess # мӢӨмҠөмҡ©мқҙлҜҖлЎң кҙҖлҰ¬мһҗ к¶Ңн•ң л¶Җм—¬
      Path: /

  BastionInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref BastionRole

  # ------------------------------------------------------------
  # EC2 мқёмҠӨн„ҙмҠӨ: мӢӨм ң лӘ…л № м„ңлІ„
  # ------------------------------------------------------------
  BastionInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref MyInstanceType
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      SubnetId: !Ref TargetSubnetId
      SecurityGroupIds:
        - !Ref BastionSecurityGroup
      IamInstanceProfile: !Ref BastionInstanceProfile
      Tags:
        - Key: Name
          Value: !Sub "${ClusterBaseName}-bastion"
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          # мӢңмҠӨн…ң кё°ліё м„Өм •
          hostnamectl --static set-hostname "${ClusterBaseName}-bastion"
          echo 'alias vi=vim' >> /etc/profile
          echo 'alias k=kubectl' >> /etc/profile
          ln -sf /usr/share/zoneinfo/Asia/Seoul /etc/localtime

          # н•„мҲҳ лҸ„кө¬ м„Өм№ҳ
          yum -y install tree jq git htop unzip yum-utils
          
          # kubectl м„Өм№ҳ (1.28 лІ„м „ мҳҲмӢң)
          curl -O https://s3.us-west-2.amazonaws.com/amazon-eks/1.28.3/2023-11-14/bin/linux/amd64/kubectl
          install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
          
          # helm м„Өм№ҳ
          curl -s https://raw.githubusercontent.com/helm/helm/master/scripts/get-helm-3 | bash
          
          # eksctl м„Өм№ҳ
          curl --silent --location "https://github.com/weaveworks/eksctl/releases/latest/download/eksctl_$(uname -s)_amd64.tar.gz" | tar xz -C /tmp
          mv /tmp/eksctl /usr/local/bin
          
          # AWS CLI v2 м„Өм№ҳ
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          ./aws/install

Outputs:
  BastionPublicIP:
    Description: "Public IP of the Bastion Server"
    Value: !GetAtt BastionInstance.PublicIp
