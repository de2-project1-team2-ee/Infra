AWSTemplateFormatVersion: '2010-09-09'
Description: "Management Server (Bastion) for EKS - High Security & Automated Linking"

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "1. Project & Team Information (Must match Network Stack)"
        Parameters:
          - ServiceName
          - TeamNumber
      - Label:
          default: "2. Instance Configuration"
        Parameters:
          - KeyName
          - MyInstanceType
          - LatestAmiId
      - Label:
          default: "3. Security Settings"
        Parameters:
          - SgIngressSshCidr
    ParameterLabels:
      ServiceName:
        default: "Service Name"
      TeamNumber:
        default: "Team Number"
      KeyName:
        default: "SSH KeyPair Name"

Parameters:
  ServiceName:
    Type: String
    Default: "IamStupid"
    Description: "Enter the same Service Name used in the Network stack."
  
  TeamNumber:
    Type: Number
    Default: 1
    Description: "Enter the same Team Number used in the Network stack."

  KeyName:
    Description: "Existing EC2 KeyPair for SSH access"
    Type: AWS::EC2::KeyPair::KeyName

  SgIngressSshCidr:
    Description: "CIDR block allowed for SSH access (Recommended: Your Public IP/32)"
    Type: String
    Default: 0.0.0.0/0

  MyInstanceType:
    Description: "EC2 instance type"
    Type: String
    Default: t3.small

  LatestAmiId:
    Description: "Amazon Linux 2 AMI"
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'

Resources:
  # ------------------------------------------------------------
  # 1. Bastion Security Group (1번 VPC 자동 참조)
  # ------------------------------------------------------------
  BastionSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "Security Group for ${ServiceName}-team-${TeamNumber} Bastion"
      VpcId: 
        Fn::ImportValue: !Sub "${ServiceName}-team-${TeamNumber}-VPCID"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: '22'
          ToPort: '22'
          CidrIp: !Ref SgIngressSshCidr
      Tags:
        - Key: Name
          Value: !Sub "${ServiceName}-team-${TeamNumber}-bastion-sg"

  # ------------------------------------------------------------
  # 2. IAM Role (관리자 권한 제거 및 최소 권한 적용)
  # ------------------------------------------------------------
  BastionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # AdministratorAccess를 제거하고 필수 권한만 부여합니다.
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
        - arn:aws:iam::aws:policy/AmazonEKSServicePolicy
        - arn:aws:iam::aws:policy/AmazonEC2FullAccess
        - arn:aws:iam::aws:policy/IAMFullAccess
      Path: /

  BastionInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref BastionRole

  # ------------------------------------------------------------
  # 3. Bastion Instance (1번 Subnet 자동 참조)
  # ------------------------------------------------------------
  BastionInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref MyInstanceType
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      SubnetId: 
        Fn::ImportValue: !Sub "${ServiceName}-team-${TeamNumber}-PubSubnetA"
      SecurityGroupIds:
        - !Ref BastionSecurityGroup
      IamInstanceProfile: !Ref BastionInstanceProfile
      Tags:
        - Key: Name
          Value: !Sub "${ServiceName}-team-${TeamNumber}-bastion"
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          # 시스템 환경 설정
          hostnamectl --static set-hostname "${ServiceName}-team-${TeamNumber}-bastion"
          echo 'alias vi=vim' >> /etc/profile
          echo 'alias k=kubectl' >> /etc/profile
          ln -sf /usr/share/zoneinfo/Asia/Seoul /etc/localtime

          # 필수 도구 설치
          yum -y install tree jq git htop unzip yum-utils
          
          # kubectl 설치 (1.28)
          curl -O https://s3.us-west-2.amazonaws.com/amazon-eks/1.28.3/2023-11-14/bin/linux/amd64/kubectl
          install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
          
          # helm & eksctl 설치
          curl -s https://raw.githubusercontent.com/helm/helm/master/scripts/get-helm-3 | bash
          curl --silent --location "https://github.com/weaveworks/eksctl/releases/latest/download/eksctl_$(uname -s)_amd64.tar.gz" | tar xz -C /tmp
          mv /tmp/eksctl /usr/local/bin
          
          # AWS CLI v2 설치
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          ./aws/install

Outputs:
  BastionPublicIP:
    Description: "Public IP of the Bastion Server"
    Value: !GetAtt BastionInstance.PublicIp
