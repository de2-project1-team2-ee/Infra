AWSTemplateFormatVersion: '2010-09-09'
Description: "Management Server (Bastion) for Container Infra - Automated Linking"

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "1. Project & Team Information (Must match Network Stack)"
        Parameters:
          - ServiceName
          - TeamNumber
      - Label:
          default: "2. Instance Configuration"
        Parameters:
          - KeyName
          - MyInstanceType
          - LatestAmiId
      - Label:
          default: "3. Security Settings"
        Parameters:
          - SgIngressSshCidr
    ParameterLabels:
      ServiceName:
        default: "Service Name"
      TeamNumber:
        default: "Team Number"

Parameters:
  ServiceName:
    Type: String
    Default: "container-project"
    Description: "Must match the ServiceName used in the Network stack."
  
  TeamNumber:
    Type: Number
    Default: 1
    Description: "Must match the TeamNumber used in the Network stack."

  KeyName:
    Description: "Existing EC2 KeyPair for SSH access"
    Type: AWS::EC2::KeyPair::KeyName

  SgIngressSshCidr:
    Description: "CIDR block allowed for SSH access"
    Type: String
    Default: 0.0.0.0/0

  MyInstanceType:
    Description: "EC2 instance type"
    Type: String
    Default: t3.small

  LatestAmiId:
    Description: "Amazon Linux 2 AMI"
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'

Resources:
  # 1. Bastion Security Group (Linking with 1st Stack VPC)
  BastionSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "Security Group for ${ServiceName}-team-${TeamNumber} Bastion"
      VpcId: 
        # [Sync] 1번 스택의 Export Name과 정확히 일치시킴
        Fn::ImportValue: !Sub "${ServiceName}-team-${TeamNumber}-vpc"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: '22'
          ToPort: '22'
          CidrIp: !Ref SgIngressSshCidr
      Tags:
        - Key: Name
          Value: !Sub "${ServiceName}-team-${TeamNumber}-bastion-sg"

  # 2. IAM Role (AdministratorAccess for lab purposes as previously agreed)
  BastionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # 은비의 원활한 실습을 위해 관리자 권한을 유지했어.
        - arn:aws:iam::aws:policy/AdministratorAccess
      Path: /

  BastionInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref BastionRole

  # 3. Bastion Instance (Linking with 1st Stack Subnet)
  BastionInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref MyInstanceType
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      SubnetId: 
        # [Sync] 1번 스택의 Export Name과 정확히 일치시킴
        Fn::ImportValue: !Sub "${ServiceName}-team-${TeamNumber}-pub-a"
      SecurityGroupIds:
        - !Ref BastionSecurityGroup
      IamInstanceProfile: !Ref BastionInstanceProfile
      Tags:
        - Key: Name
          Value: !Sub "${ServiceName}-team-${TeamNumber}-bastion"
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          hostnamectl --static set-hostname "${ServiceName}-team-${TeamNumber}-bastion"
          echo 'alias vi=vim' >> /etc/profile
          echo 'alias k=kubectl' >> /etc/profile
          ln -sf /usr/share/zoneinfo/Asia/Seoul /etc/localtime

          yum -y install tree jq git htop unzip yum-utils
          
          # kubectl v1.31 (Sync with EKS Cluster version)
          curl -O https://s3.us-west-2.amazonaws.com/amazon-eks/1.31.0/2024-09-12/bin/linux/amd64/kubectl
          install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
          
          curl -s https://raw.githubusercontent.com/helm/helm/master/scripts/get-helm-3 | bash
          curl --silent --location "https://github.com/weaveworks/eksctl/releases/latest/download/eksctl_$(uname -s)_amd64.tar.gz" | tar xz -C /tmp
          mv /tmp/eksctl /usr/local/bin
          
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          ./aws/install

Outputs:
  BastionPublicIP:
    Description: "Public IP of the Bastion Server"
    Value: !GetAtt BastionInstance.PublicIp
